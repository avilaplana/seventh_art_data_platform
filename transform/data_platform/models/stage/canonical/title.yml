models:
  - name: title
    config:
      contract:
        enforced: true
    description: >
      Core table representing IMDb titles such as movies,
      TV series, and episodes.
    columns:
      - name: title_id
        data_type: string
        description: Primary key identifying a title.
        tests:
          - not_null
          - unique
      - name: title_type_id
        data_type: string
        description: Foreign key indicating the type of title.
        tests:
          - not_null
          - relationships:
              to: ref('title_type')
              field: title_type_id
      - name: primary_title
        data_type: string
        description: Main display title used by IMDb.
        tests:
          - not_null
      - name: original_title
        data_type: string
        description: Original title in the language of production.
        tests:
          - not_null
      - name: is_adult
        data_type: boolean
        description: Indicates whether the title is intended for adults.
        tests:
          - not_null
          - accepted_values:
              values: ['true', 'false']
      - name: release_year
        data_type: int
        description: Year the title was first released.
      - name: duration_minutes
        data_type: int
        description: Runtime of the title in minutes.
      - name: average_rating
        data_type: decimal(18,2)
        description: Average IMDb user rating for the title.
        tests:
          - not_null
      - name: number_of_votes
        data_type: int
        description: Number of user votes contributing to the average rating.
        tests:
          - not_null
      - name: ingested_at_timestamp
        data_type: timestamp
        description: Timestamp when the record was ingested into the data platform.
        tests:
          - not_null

      - name: snapshot_date
        data_type: date
        description: Date of the snapshot from which this record was loaded.
        tests:
          - not_null

      - name: snapshot_try
        data_type: int
        description: Retry attempt number for the snapshot ingestion.
        tests:
          - not_null
