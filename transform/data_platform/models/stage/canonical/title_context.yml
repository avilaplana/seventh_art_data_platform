models:
  - name: title_context
    config:
      contract:
        enforced: true
    description: >
      Lookup table describing attributes associated with localized titles,
      such as alternative titles, original titles, or other naming qualifiers.
    columns:
      - name: title_context_id
        data_type: string
        description: Primary key identifying a title context.
        tests:
          - not_null
          - unique
      - name: title_context_name
        data_type: string
        description: Human-readable name of the title context.
        tests:
          - not_null
          - unique
      - name: title_context_category
        data_type: string
        description: >
          Normalized category assigned when the pattern matches
          an attribute value. Categories group similar attribute
          semantics to simplify modeling and analytics.

          Typical categories include:
          - version: alternative edits or cuts of a title
          - distribution: titles used for specific media formats
          - festival: titles used for film festivals or premieres
          - translation: translated or transliterated titles
          - marketing: promotional or advertising titles
          - release_context: titles used during the release lifecycle
          - episode_context: season, episode, or segment titles
          - unofficial: incorrect, bootleg, or rumored titles
          - other: fallback classification when no rule applies
        tests:
          - not_null
      - name: ingested_at_timestamp
        data_type: timestamp
        description: Timestamp when the record was ingested into the data platform.
        tests:
          - not_null

      - name: snapshot_date
        data_type: date
        description: Date of the snapshot from which this record was loaded.
        tests:
          - not_null

      - name: snapshot_try
        data_type: int
        description: Retry attempt number for the snapshot ingestion.
        tests:
          - not_null
