models:
  - name: genre_title
    config:
      contract:
        enforced: true
    description: >
      Bridge table mapping titles to genres.
      A title can belong to multiple genres.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - genre_id
            - title_id
    columns:
      - name: genre_id
        data_type: string
        description: Foreign key to the genre assigned to the title.
        tests:
          - not_null
          - relationships:
              to: ref('genre')
              field: genre_id
      - name: title_id
        data_type: string
        description: Foreign key to the title associated with the genre.
        tests:
          - not_null
          - relationships:
              to: ref('title')
              field: title_id
      - name: ingested_at_timestamp
        data_type: timestamp
        description: Timestamp when the record was ingested into the data platform.
        tests:
          - not_null

      - name: snapshot_date
        data_type: date
        description: Date of the snapshot from which this record was loaded.
        tests:
          - not_null

      - name: snapshot_try
        data_type: int
        description: Retry attempt number for the snapshot ingestion.
        tests:
          - not_null
