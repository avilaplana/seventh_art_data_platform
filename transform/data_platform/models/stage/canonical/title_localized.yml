models:
  - name: title_localized
    config:
      contract:
        enforced: true
    description: >
      Table containing localized versions of titles by region and language,
      including alternative and original titles.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - title_id
            - region_id
            - language_id
            - title_context_id
            - ordering
      - distinct_region_count_matches
      - distinct_language_count_matches
    columns:
      - name: title_id
        data_type: string
        description: Foreign key to the title.
        tests:
          - not_null
          - relationships:
              to: ref('title')
              field: title_id
              severity: error
      - name: title
        data_type: string
        description: Localized title text.
        tests:
          - not_null
      - name: ordering
        data_type: int
        description: Ordering index when multiple localized titles exist.
        tests:
          - not_null
      - name: region_id
        data_type: bigint
        description: Region where the localized title is used.
        tests:
          - relationships:
              to: ref('regions')
              field: region_id
      - name: language_id
        data_type: bigint
        description: Language of the localized title.
        tests:
          - relationships:
              to: ref('languages')
              field: language_id
      - name: title_context_id
        data_type: string
        description: Attribute describing the type of localized title.
        tests:
          - relationships:
              to: ref('title_context')
              field: title_context_id
      - name: is_original_title
        data_type: boolean
        description: Indicates whether this is the original title for the region/language.
        tests:
          - not_null
      - name: ingested_at_timestamp
        data_type: timestamp
        description: Timestamp when the record was ingested into the data platform.
        tests:
          - not_null

      - name: snapshot_date
        data_type: date
        description: Date of the snapshot from which this record was loaded.
        tests:
          - not_null

      - name: snapshot_try
        data_type: int
        description: Retry attempt number for the snapshot ingestion.
        tests:
          - not_null
